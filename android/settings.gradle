pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")

        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { properties.load(it) }
        }

        def flutterSdkPath = properties.getProperty("flutter.sdk")

        if (flutterSdkPath == null || flutterSdkPath.isEmpty()) {
            flutterSdkPath = System.getenv("FLUTTER_ROOT")
        }

        assert flutterSdkPath != null && !flutterSdkPath.isEmpty(),
                "Flutter SDK not found. Set flutter.sdk in android/local.properties or FLUTTER_ROOT in your environment."

        return flutterSdkPath
    }

    settings.ext.flutterSdkPath = flutterSdkPath()

    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "7.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.7.10" apply false
}

include ":app"
